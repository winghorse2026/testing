<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JSON Interpreter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    textarea {
      width: 100%;
      height: 200px;
      font-family: monospace;
    }
    button {
      margin-top: 10px;
      padding: 10px 20px;
    }
    table {
      border-collapse: collapse;
      margin-top: 20px;
      width: 100%;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }
    th {
      background: #f4f4f4;
    }
    pre {
      background: #f8f8f8;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h2>JSON Interpreter</h2>

<p>Paste JSON payload below:</p>

<textarea id="jsonInput" placeholder='[{"name":"Alice","age":30}]'></textarea>
<br />
<button onclick="renderJSON()">Render</button>

<div id="output"></div>

<script>
function renderJSON() {
  const input = document.getElementById("jsonInput").value;
  const output = document.getElementById("output");

  try {
    const data = JSON.parse(input);
    output.innerHTML = "";

    if (Array.isArray(data) && typeof data[0] === "object") {
      output.appendChild(jsonToTable(data));
    }

    const pre = document.createElement("pre");
    pre.textContent = JSON.stringify(data, null, 2);
    output.appendChild(pre);

  } catch (e) {
    output.innerHTML = "<p style='color:red'>Invalid JSON</p>";
  }
}

function jsonToTable(jsonArray) {
  const table = document.createElement("table");
  const headers = Object.keys(jsonArray[0]);

  const thead = table.createTHead();
  const headRow = thead.insertRow();
  headers.forEach(h => {
    const th = document.createElement("th");
    th.textContent = h;
    headRow.appendChild(th);
  });

  const tbody = table.createTBody();
  jsonArray.forEach(obj => {
    const row = tbody.insertRow();
    headers.forEach(h => {
      const cell = row.insertCell();
      cell.textContent = obj[h];
    });
  });

  return table;
}
</script>

</body>
</html>
